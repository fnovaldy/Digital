<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero{
background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
}

.hero h1{
font-family:'Playfair Display';
font-size:60px;
animation:fadeUp 2s ease;
}

.hero h2{
font-size:25px;
margin-top:10px;
animation:fadeUp 3s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.info{
background:#111;
}

.info h2{
font-size:40px;
}

.countdown{
font-size:40px;
margin-top:20px;
}

.gallery{
background:#000;
}

.gallery img{
width:250px;
margin:10px;
border-radius:10px;
transition:0.5s;
}

.gallery img:hover{
transform:scale(1.1);
}

.button{
margin-top:30px;
padding:12px 30px;
background:#e6b800;
color:black;
text-decoration:none;
border-radius:20px;
font-weight:bold;
}

</style>
</head>

<body>

<section class="section hero">

<h1>Fauzan & Pasangan</h1>
<h2>Akan Melangsungkan Pernikahan</h2>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</section>

<section class="section info">

<h2>Save The Date</h2>

<p>Minggu, 20 Desember 2026</p>
<p>Gedung Pernikahan Bahagia</p>

<div class="countdown" id="countdown"></div>

</section>

<section class="section gallery">

<h2>Gallery</h2>

<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">

</section>

<section class="section info">

<h2>Lokasi Acara</h2>

<a class="button" href="https://maps.google.com" target="_blank">
Buka Google Maps
</a>

</section>

<script>

var target = new Date("Dec 20, 2026 09:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = target - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance % (1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days+" Hari "+hours+" Jam "+minutes+" Menit";

},1000);

</script>

</body>
</html>
